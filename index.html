<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevLinks</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="container">
      <div id="profile">
        <img src="./assets/avatar.png" alt="Foto de Victor em preto e branco" />
        <p>@vitoidk</p>
      </div>

      <div id="switch" onclick="toggleMode()">
        <button></button>
        <span></span>
      </div>

      <ul>
        <li>
          <a
            href="https://www.youtube.com/@vitoidk?sub_confirmation=1"
            target="_blank"
            >Inscrever-se no vitoidk</a
          >
        </li>

        <li>
          <a href="https://soundcloud.com/shutupidk" target="_blank"
            >Escutar minhas músicas</a
          >
        </li>

        <li>
          <a href="https://github.com/vitoidk" target="_blank"
            >Ver meu portifólio</a
          >
        </li>

        <li>
          <a href="https://steamcommunity.com/id/vitoidk/" target="_blank"
            >Acessar minha steam</a
          >
        </li>
      </ul>
      <div id="social-links">
        <a href="https://github.com/vitoidk" target="_blank">
          <ion-icon name="logo-github"></ion-icon>
        </a>

        <a href="https://instagram.com/vitoidk" target="_blank">
          <ion-icon name="logo-instagram"></ion-icon>
        </a>

        <a href="https://steamcommunity.com/id/vitoidk/" target="_blank">
          <ion-icon name="logo-steam"></ion-icon>
        </a>

        <a href="https://soundcloud.com/shutupidk/" target="_blank">
          <ion-icon name="logo-soundcloud"></ion-icon>
        </a>
      </div>

      <footer>Feito com ♥ por vitoidk</footer>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <script src="./script.js"></script>
  </body>
</html>
